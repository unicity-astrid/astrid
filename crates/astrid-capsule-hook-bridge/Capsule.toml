[package]
name = "astrid-capsule-hook-bridge"
version = "0.1.0"
description = "Hook bridge capsule — maps lifecycle events to semantic hooks with merge strategies"
authors = ["Astrid Core Team"]
astrid-version = ">=0.1.0"

[[component]]
id = "hook-bridge"
file = "astrid_capsule_hook_bridge.wasm"
type = "executable"

# ── Session lifecycle ──
[[interceptor]]
event = "lifecycle.v1.session_created"
action = "on_session_created"

[[interceptor]]
event = "lifecycle.v1.session_ended"
action = "on_session_ended"

# ── Tool hooks ──
[[interceptor]]
event = "lifecycle.v1.tool_call_started"
action = "on_tool_call_started"

[[interceptor]]
event = "lifecycle.v1.tool_call_completed"
action = "on_tool_call_completed"

[[interceptor]]
event = "lifecycle.v1.tool_result_persisting"
action = "on_tool_result_persisting"

# ── Message hooks ──
[[interceptor]]
event = "lifecycle.v1.message_received"
action = "on_message_received"

[[interceptor]]
event = "lifecycle.v1.message_sending"
action = "on_message_sending"

[[interceptor]]
event = "lifecycle.v1.message_sent"
action = "on_message_sent"

# ── Sub-agent hooks ──
[[interceptor]]
event = "lifecycle.v1.sub_agent_spawned"
action = "on_subagent_spawned"

[[interceptor]]
event = "lifecycle.v1.sub_agent_completed"
action = "on_subagent_completed"

[[interceptor]]
event = "lifecycle.v1.sub_agent_failed"
action = "on_subagent_failed"

[[interceptor]]
event = "lifecycle.v1.sub_agent_cancelled"
action = "on_subagent_cancelled"

# ── Context compaction ──
[[interceptor]]
event = "lifecycle.v1.context_compaction_started"
action = "on_compaction_started"

[[interceptor]]
event = "lifecycle.v1.context_compaction_completed"
action = "on_compaction_completed"

# ── Kernel lifecycle ──
[[interceptor]]
event = "lifecycle.v1.kernel_started"
action = "on_kernel_started"

[[interceptor]]
event = "lifecycle.v1.kernel_shutdown"
action = "on_kernel_shutdown"

[capabilities]
# Hook bridge needs to publish hook results on the event bus
ipc_publish = [
    "hook.v1.result.*",
]
