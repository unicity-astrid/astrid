[package]
name = "astrid-capsule-react"
version = "0.1.0"
description = "ReAct loop: stateless coordinator for LLM reasoning and tool execution"
authors = ["Astrid Core Team"]
astrid-version = ">=0.1.0"

[[component]]
id = "react"
file = "astrid_capsule_react.wasm"
type = "executable"

# User input from frontends (CLI, Telegram, etc.)
[[interceptor]]
event = "user.prompt"
action = "handle_user_prompt"

# System prompt returned by the identity capsule
[[interceptor]]
event = "identity.response.ready"
action = "handle_identity_response"

# Assembled prompt returned by the prompt builder capsule
[[interceptor]]
event = "prompt_builder.response.assemble"
action = "handle_prompt_response"

# LLM streaming events from any provider capsule
[[interceptor]]
event = "llm.stream.*"
action = "handle_llm_stream"

# Tool execution results from the tool router
[[interceptor]]
event = "tool.execute.result"
action = "handle_tool_result"

# Active model changed by the registry capsule
[[interceptor]]
event = "registry.active_model_changed"
action = "handle_model_changed"

# Periodic watchdog tick from the kernel for timeout enforcement
[[interceptor]]
event = "react.watchdog.tick"
action = "handle_watchdog_tick"

# Event bus broadcast lag notification from the dispatcher
[[interceptor]]
event = "system.event_bus.lagged"
action = "handle_bus_lag"

[dependencies]
requires = [
    "topic:identity.response.ready",
    "topic:session.response.get_messages",
]

[capabilities]
ipc_publish = [
    "identity.request.build",
    "prompt_builder.assemble",
    "agent.stream.delta",
    "agent.response",
    "tool.request.execute",
    "llm.request.generate.*",
    "session.request.get_messages",
]
