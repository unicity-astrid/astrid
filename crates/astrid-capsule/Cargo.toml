[package]
name = "astrid-capsule"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "Core runtime management for User-Space Capsules in Astrid OS"

[dependencies]
astrid-approval = { workspace = true }
astrid-capabilities = { workspace = true }
astrid-core = { workspace = true }
astrid-crypto = { workspace = true }
astrid-events = { workspace = true }
astrid-mcp = { workspace = true }
astrid-storage = { workspace = true, features = ["keychain"] }
astrid-vfs = { workspace = true }
astrid-workspace = { workspace = true }
async-trait = { workspace = true }
blake3 = { workspace = true }
extism = { workspace = true }
notify = "7"
reqwest = { workspace = true }
semver = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tempfile = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tokio-util = { workspace = true }
toml = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }
wasmparser = { workspace = true }

[target.'cfg(unix)'.dependencies]
nix = { workspace = true }

[dev-dependencies]
astrid-crypto = { workspace = true }
astrid-mcp = { workspace = true, features = ["test-support"] }
wasm-encoder = { workspace = true }

[lints.rust]
unsafe_code = "deny"

[lints.clippy]
all = { level = "warn", priority = -1 }
