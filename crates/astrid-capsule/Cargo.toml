[package]
name = "astrid-capsule"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "Core runtime management for User-Space Capsules in Astrid OS"

[dependencies]
astrid-core = { workspace = true }
astrid-vfs = { workspace = true }
astrid-capabilities = { workspace = true }
astrid-events = { workspace = true, features = ["runtime"] }
astrid-storage = { workspace = true, features = ["keychain"] }
astrid-approval = { workspace = true, optional = true }
astrid-mcp = { workspace = true }
extism = { workspace = true }
uuid = { workspace = true }
tempfile = { workspace = true }
reqwest = { workspace = true }
blake3 = { workspace = true }
notify = "7"
semver = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
toml = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
async-trait = { workspace = true }
astrid-workspace.workspace = true

[dev-dependencies]
astrid-audit = { workspace = true }
astrid-crypto = { workspace = true }
# Enable test-support feature for tests (merges with the [dependencies] entry)
astrid-mcp = { workspace = true, features = ["test-support"] }

# NOTE: astrid-mcp appears in both [dependencies] and [dev-dependencies].
# Cargo merges the feature sets: production builds get no extra features,
# test builds additionally enable "test-support".

[features]
default = ["approval"]
approval = ["astrid-approval"]
