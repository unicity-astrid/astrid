[package]
name = "astrid-capsule-cli"
version = "0.1.0"
description = "Native Unix Socket bridge for the Astrid CLI frontend."

[[component]]
id = "main"
file = "astrid_capsule_cli.wasm"

[capabilities]
uplink = true
net_bind = ["unix:*"]
ipc_publish = [
    "user.prompt",
    "registry.get_providers",
    "registry.set_active_model",
    "kernel.request.*",
    "cli.command.execute",
]