[package]
name = "astrid-capsule-skills"
version = "0.1.0"
description = "Skills Loader - Reads and loads Agent Skills via VFS"
authors = ["Astrid Core Team"]
astrid-version = ">=0.1.0"

[[component]]
id = "skills-loader"
file = "astrid_capsule_skills.wasm"
type = "executable"
capabilities = { fs_read = ["workspace://"] }

[[tool]]
name = "list_skills"
description = "List all available skills by parsing SKILL.md files in the skills directory."

[[tool]]
name = "read_skill"
description = "Read the full content of a specific skill's SKILL.md file."

[capabilities]
ipc_publish = []
